<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VexFlow Lane PoC — リズムクルーズ PROカスタムSTAGE編集UI 検証</title>
<!--
  ================================================================
  これは検証専用の単独 PoC ページです。
  - 既存アプリ本体（index.html / script.js / theme.css / service-worker.js）
    には一切読み込まれません。手動でこのファイルを開いたときだけ動きます。
  - VexFlow は ../vendor/vexflow.js をローカル読み込み（CDN非依存）。
  目的：pattern → 楽譜イベント変換 → VexFlow描画 →
        透明セル単位タップ格子オーバーレイ → 下段ストローク方向UI、までを検証。
  ================================================================
-->
<style>
  :root {
    --ink: #e8eef6;          /* 譜面の明色（濃色カード上で見やすく） */
    --ink-dim: #9fb0c4;
    --card: #16202e;         /* 濃色カード */
    --card-2: #1e2b3c;
    --accent: #4fa3ff;
    --tap-line: rgba(120,160,210,.18);
    --cell-w: 72px;          /* 1セルの横幅。タップ格子と pin 計算で共有 */
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 20px;
    background: #0c121b; color: var(--ink);
    font-family: -apple-system, "Hiragino Sans", "Outfit", sans-serif;
    line-height: 1.5;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--ink-dim); font-size: 12px; margin: 0 0 16px; }

  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
  .controls button.sample {
    background: var(--card-2); color: var(--ink); border: 1px solid #2c3c52;
    padding: 8px 12px; border-radius: 10px; font-size: 13px; cursor: pointer;
  }
  .controls button.sample.active { border-color: var(--accent); background: #20344b; }
  .controls label { font-size: 12px; color: var(--ink-dim); display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }

  /* 濃色カード */
  .card {
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid #243347; border-radius: 16px;
    padding: 14px 12px 12px; margin-bottom: 16px;
    box-shadow: 0 8px 28px rgba(0,0,0,.35);
  }
  .card .label { font-size: 11px; letter-spacing: .08em; color: var(--ink-dim); margin-bottom: 8px; text-transform: uppercase; }

  /* 横スクロールする1小節レーン。中で score / tap / arrow を縦に重ねる */
  .lane-scroll { overflow-x: auto; overflow-y: hidden; padding-bottom: 6px; }
  .lane {
    position: relative;
    /* 幅は JS で N*cell-w に設定 */
  }

  /* 譜面（VexFlow SVG）— 背面・視覚専用 */
  .score { position: relative; z-index: 1; }
  .score svg { display: block; }
  /* VexFlow の描画色を濃色カード向けに上書き（fill/stroke 両方） */
  .score svg path { fill: var(--ink); stroke: var(--ink); }
  .score svg rect { fill: var(--ink); }     /* 連桁バー・小節線など */

  /* 小節線・拍の薄いガイド（タップ格子の区切り） */
  .tap-grid {
    position: absolute; top: 0; left: 0; z-index: 2;
    display: flex; height: 100%;
  }
  .tap-cell {
    width: var(--cell-w); height: 100%;
    border-left: 1px solid var(--tap-line);
    background: transparent; padding: 0; margin: 0;
    cursor: pointer; -webkit-appearance: none; appearance: none; border-radius: 0;
    border-top: none; border-bottom: none; border-right: none;
  }
  .tap-cell:last-child { border-right: 1px solid var(--tap-line); }
  .tap-cell.beat { border-left-color: rgba(120,160,210,.42); }  /* 拍頭は濃いめ */
  .tap-cell:active { background: rgba(79,163,255,.14); }
  .tap-cell.flash { background: rgba(79,163,255,.22); }

  /* 下段ストローク方向UI */
  .arrow-row { display: flex; margin-top: 6px; }
  .arrow-cell {
    width: var(--cell-w); text-align: center; font-size: 18px; font-weight: 700;
    color: var(--ink);
  }
  .arrow-cell .ghost { color: var(--ink-dim); font-weight: 500; }
  .arrow-cell .none { color: #5b6b7e; font-size: 13px; }
  .beat-row { display: flex; margin-top: 2px; }
  .beat-cell { width: var(--cell-w); text-align: center; font-size: 10px; color: var(--ink-dim); }

  .status {
    font-size: 13px; color: var(--ink); background: #14202e; border: 1px solid #243347;
    border-radius: 10px; padding: 10px 12px; min-height: 20px;
  }
  .status b { color: var(--accent); }
  details { margin-top: 14px; color: var(--ink-dim); font-size: 12px; }
  details pre { background: #0f1722; border: 1px solid #1f2c3c; border-radius: 8px; padding: 10px; overflow-x: auto; color: #c8d6e6; }
  .err { color: #ff8b8b; }
</style>
</head>
<body>
  <h1>VexFlow Lane PoC</h1>
  <p class="sub">PROカスタムSTAGE編集UIの譜面表示を VexFlow 方式で検証（本体未組込・このページ単独）。</p>

  <div class="controls" id="samples"></div>
  <div class="controls">
    <label><input type="checkbox" id="pin" checked> 音符をセル列にピン留め（本実装の基本仕様）</label>
    <label><input type="checkbox" id="showgrid" checked> タップ格子の枠線を表示</label>
    <label><input type="checkbox" id="guides" checked> 確認用ガイド（セル中心線・符頭中心マーカー／PoC専用）</label>
  </div>

  <div class="card">
    <div class="label" id="card-label">Sample</div>
    <div class="lane-scroll">
      <div class="lane" id="lane">
        <div class="score" id="score"></div>
        <div class="tap-grid" id="tapgrid"></div>
      </div>
    </div>
    <div class="lane-scroll">
      <div id="arrowwrap">
        <div class="arrow-row" id="arrowrow"></div>
        <div class="beat-row" id="beatrow"></div>
      </div>
    </div>
  </div>

  <div class="status" id="status">セルをタップすると、その index と元 pattern の内容を表示します。</div>

  <details>
    <summary>変換結果（pattern → 楽譜イベント → VexFlow音価）を見る</summary>
    <pre id="debug"></pre>
  </details>

  <!-- VexFlow ローカル読み込み（CDN非依存）。グローバル Vex を生やす -->
  <script src="../vendor/vexflow.js"></script>
  <script>
  (function () {
    "use strict";
    const VF = (window.Vex && (window.Vex.Flow || window.Vex)) || null;
    const statusEl = document.getElementById('status');
    if (!VF || !VF.Stave) {
      statusEl.innerHTML = '<span class="err">VexFlow の読み込みに失敗しました（../vendor/vexflow.js）。</span>';
      return;
    }
    const { Renderer, Stave, StaveNote, Beam, StaveTie, Voice, Formatter, Stem, Fraction } = VF;

    const CELL_W = 72;            // CSS --cell-w と一致させる
    const EIGHTHS_PER_BEAT = 2;   // 4/4・1拍=8分2つ
    const SVGNS = 'http://www.w3.org/2000/svg';

    /* ---------- サンプル pattern ---------- */
    const SAMPLES = {
      A: { name: 'A. 4分音符×4', grid: 'quarter', pattern: [
        { hit:true, dir:"down", type:"hit" },
        { hit:true, dir:"down", type:"hit" },
        { hit:true, dir:"down", type:"hit" },
        { hit:true, dir:"down", type:"hit" },
      ]},
      B: { name: 'B. 8分連桁×4', grid: 'eighth', pattern: [
        { hit:true, dir:"down", type:"hit" }, { hit:true, dir:"up", type:"hit" },
        { hit:true, dir:"down", type:"hit" }, { hit:true, dir:"up", type:"hit" },
        { hit:true, dir:"down", type:"hit" }, { hit:true, dir:"up", type:"hit" },
        { hit:true, dir:"down", type:"hit" }, { hit:true, dir:"up", type:"hit" },
      ]},
      C: { name: 'C. hit+tie→4分相当', grid: 'eighth', pattern: [
        { hit:true,  dir:"down", type:"hit" }, { hit:false, dir:"up", type:"tie" },
        { hit:true,  dir:"down", type:"hit" }, { hit:false, dir:"up", type:"tie" },
        { hit:true,  dir:"down", type:"hit" }, { hit:true,  dir:"up", type:"hit" },
        { hit:false, dir:"down", type:"rest" }, { hit:false, dir:"up", type:"rest" },
      ]},
      D: { name: 'D. 休符入り', grid: 'eighth', pattern: [
        { hit:true,  dir:"down", type:"hit" }, { hit:false, dir:"up", type:"rest" },
        { hit:true,  dir:"down", type:"hit" }, { hit:false, dir:"up", type:"tie" },
        { hit:false, dir:"down", type:"rest" }, { hit:false, dir:"up", type:"rest" },
        { hit:true,  dir:"down", type:"hit" }, { hit:true,  dir:"up", type:"hit" },
      ]},
      // 拍をまたぐ tie を「実際の弧」で見せる追加デモ（capability確認用）
      E: { name: 'E. タイ弧（拍跨ぎ）', grid: 'eighth', pattern: [
        { hit:false, dir:null,   type:"rest" }, { hit:true,  dir:"up", type:"hit" },
        { hit:false, dir:"down", type:"tie" },  { hit:false, dir:null, type:"rest" },
        { hit:false, dir:null,   type:"rest" }, { hit:true,  dir:"up", type:"hit" },
        { hit:false, dir:"down", type:"tie" },  { hit:false, dir:null, type:"rest" },
      ]},
    };

    /* ---------- pattern → 楽譜イベント ----------
       grid: quarter=1セル2/8拍, eighth=1セル1/8拍。
       hit=音符開始, tie=直前の音符へ結合, rest=休符（連続restは結合）。 */
    function patternToEvents(pattern, grid) {
      const unit = (grid === 'quarter') ? 2 : 1; // 1セルの長さ（8分単位）
      const events = [];
      pattern.forEach((cell, i) => {
        if (cell.type === 'hit') {
          events.push({ kind: 'note', cells: [i], startCell: i, durEighths: unit });
        } else if (cell.type === 'tie') {
          const prev = events[events.length - 1];
          if (prev && prev.kind === 'note') { prev.durEighths += unit; prev.cells.push(i); }
          else { events.push({ kind: 'rest', cells: [i], startCell: i, durEighths: unit }); } // 先頭tieは休符扱い
        } else { // rest
          const prev = events[events.length - 1];
          if (prev && prev.kind === 'rest') { prev.durEighths += unit; prev.cells.push(i); }
          else { events.push({ kind: 'rest', cells: [i], startCell: i, durEighths: unit }); }
        }
      });
      // 絶対開始位置（8分単位）を付与
      let pos = 0;
      events.forEach(ev => { ev.startEighths = pos; pos += ev.durEighths; });
      return { events, unit, totalEighths: pos };
    }

    /* 拍境界で分割（4/4）。返り値: [{start,len}]（8分単位）。
       各 seg は拍内に収まるので len は 1 or 2 → '8' or 'q' に対応。 */
    function segmentByBeat(start, len) {
      const segs = [];
      let s = start, rem = len;
      while (rem > 0) {
        const nextBoundary = Math.floor(s / EIGHTHS_PER_BEAT) * EIGHTHS_PER_BEAT + EIGHTHS_PER_BEAT;
        const take = Math.min(rem, nextBoundary - s);
        segs.push({ start: s, len: take });
        s += take; rem -= take;
      }
      return segs;
    }

    // 拍内の長さ(1|2 8分) → VexFlow duration。rest は 'r' を付ける。
    function lenToDuration(len, isRest) {
      const base = (len >= 2) ? 'q' : '8';
      return base + (isRest ? 'r' : '');
    }

    /* イベント列 → VexFlow StaveNote 列（拍分割・タイ情報つき） */
    function eventsToVexNotes(events, unit) {
      const items = []; // {note, startEighths, len, isRest, event, tieToPrev}
      events.forEach(ev => {
        const segs = segmentByBeat(ev.startEighths, ev.durEighths);
        segs.forEach((seg, si) => {
          const isRest = (ev.kind === 'rest');
          const dur = lenToDuration(seg.len, isRest);
          const note = new StaveNote({
            keys: ['b/4'],            // 単線上に乗せる
            duration: dur,
            stem_direction: Stem.UP,  // リズム譜らしく上向きに統一
          });
          items.push({
            note, startEighths: seg.start, len: seg.len, isRest,
            event: ev, durStr: dur,
            tieToPrev: (!isRest && si > 0), // 同一音符の2つ目以降の seg は前の seg とタイ
          });
        });
      });
      return items;
    }

    /* ---------- 描画 ---------- */
    let current = 'A';

    function render() {
      const conf = SAMPLES[current];
      const { events, unit, totalEighths } = patternToEvents(conf.pattern, conf.grid);
      const items = eventsToVexNotes(events, unit);
      const N = conf.pattern.length;
      const laneW = N * CELL_W;
      const height = 110;
      const pin = document.getElementById('pin').checked;

      document.getElementById('card-label').textContent = conf.name + '（' + conf.grid + ' / ' + N + 'マス）';
      document.documentElement.style.setProperty('--cell-w', CELL_W + 'px');

      // --- 譜面 ---
      const scoreEl = document.getElementById('score');
      scoreEl.innerHTML = '';
      const lane = document.getElementById('lane');
      lane.style.width = laneW + 'px';

      const renderer = new Renderer(scoreEl, Renderer.Backends.SVG);
      renderer.resize(laneW, height);
      const ctx = renderer.getContext();
      ctx.setFillStyle('#e8eef6'); ctx.setStrokeStyle('#e8eef6');

      // 単線スターブ（音符のY座標計算用）。線自体は描かない。
      // VexFlow標準の単線は符頭(b/4)の中心と一致しないため、描画後に
      // 実際の符頭中心Yへ合わせた基準線を1本だけ自前で引く（drawBaseline）。
      const stave = new Stave(0, 30, laneW, { fill_style: '#e8eef6' });
      stave.setNumLines(1);
      stave.setContext(ctx);

      const notes = items.map(it => it.note);
      const voice = new Voice({ num_beats: 4, beat_value: 4 });
      voice.setStrict(false);
      voice.addTickables(notes);

      // 連桁：拍ごと（2/8）に自動グループ化。休符はまたがない。
      const beams = Beam.generateBeams(notes, {
        groups: [new Fraction(2, 8)],
        beam_rests: false,
        maintain_stem_directions: true,
      });

      new Formatter().joinVoices([voice]).format([voice], laneW - 24);

      // 各音符に stave を割り当てておく（getNoteHeadBeginX 等の絶対X計算に stave 左オフセットを含めるため）。
      // これをしないと、測定時(stave未設定)と描画時(stave設定済)でX原点がズレる。
      notes.forEach(n => n.setStave(stave));

      // セル列ピン留め（本実装の基本仕様）：
      //  各音符の「符頭中心X」を、その音符の【開始セル】の中心Xへ合わせる。
      //  - 開始セル = it.startEighths / unit（hit+tie の4分相当も hit の開始セル＝表に置く）
      //  - 符頭の左端ではなく中心(begin + 符頭幅/2)を基準にする
      if (pin) {
        items.forEach(it => {
          const startCell = it.startEighths / unit;          // 結合後も開始セル基準（裏へ寄らせない）
          const desiredCenter = (startCell + 0.5) * CELL_W;  // セル中心X
          const center = noteHeadCenterX(it.note);           // 現在の符頭中心（xShift=0前提）
          it.note.setXShift(desiredCenter - center);
        });
      }

      voice.draw(ctx, stave);
      beams.forEach(b => b.setContext(ctx).draw());

      // タイ弧：同一音符内で分割された連続 seg を結ぶ
      for (let i = 1; i < items.length; i++) {
        if (items[i].tieToPrev) {
          new StaveTie({
            first_note: items[i - 1].note,
            last_note: items[i].note,
            first_indices: [0], last_indices: [0],
          }).setContext(ctx).draw();
        }
      }

      // 横基準線：VexFlowが実際に描いた符頭の中心Yに合わせて1本だけ引く（符頭中心を必ず通る）。
      const baselineY = computeBaselineY(items, stave);
      drawBaseline(scoreEl, laneW, baselineY);

      // 確認用ガイド（PoC専用・本実装では不要）：セル中心の縦線＋符頭中心マーカー。
      if (document.getElementById('guides').checked) {
        drawGuides(scoreEl, N, height, items, baselineY);
      }

      // --- タップ格子（透明・セル単位） ---
      const tap = document.getElementById('tapgrid');
      tap.innerHTML = '';
      tap.style.display = document.getElementById('showgrid').checked ? 'flex' : 'flex';
      conf.pattern.forEach((cell, i) => {
        const b = document.createElement('button');
        b.className = 'tap-cell' + ((i % (conf.grid === 'eighth' ? 2 : 1) === 0) ? ' beat' : '');
        if (!document.getElementById('showgrid').checked) b.style.borderColor = 'transparent';
        b.dataset.index = i;
        b.addEventListener('click', () => {
          statusEl.innerHTML = 'タップ: セル <b>#' + i + '</b> ／ type=<b>' + cell.type +
            '</b> dir=<b>' + (cell.dir == null ? 'null' : cell.dir) + '</b> hit=' + cell.hit;
          b.classList.add('flash');
          setTimeout(() => b.classList.remove('flash'), 180);
        });
        tap.appendChild(b);
      });

      // --- 下段ストローク方向UI ---
      const arrowrow = document.getElementById('arrowrow');
      const beatrow = document.getElementById('beatrow');
      arrowrow.innerHTML = ''; beatrow.innerHTML = '';
      document.getElementById('arrowwrap').style.width = laneW + 'px';
      conf.pattern.forEach((cell, i) => {
        const a = document.createElement('div');
        a.className = 'arrow-cell';
        a.innerHTML = strokeGlyph(cell);
        arrowrow.appendChild(a);

        const bc = document.createElement('div');
        bc.className = 'beat-cell';
        // 拍ラベル：quarter=1..4、eighth=1 & ・
        if (conf.grid === 'quarter') bc.textContent = String(i + 1);
        else bc.textContent = (i % 2 === 0) ? String(i / 2 + 1) : '＆';
        beatrow.appendChild(bc);
      });

      // --- デバッグ出力 ---
      document.getElementById('debug').textContent = buildDebug(conf, events, items, unit);
    }

    /* 符頭中心X（現在の x_shift を含む）。begin = 符頭左端、glyph幅の半分で中心に。 */
    function noteHeadCenterX(note) {
      return note.getNoteHeadBeginX() + note.getGlyphWidth() / 2;
    }

    /* 横基準線Y：描画済みの最初の音符の符頭中心Y。無ければスターブ線Yで代用。 */
    function computeBaselineY(items, stave) {
      for (const it of items) {
        if (it.isRest) continue;
        try { const ys = it.note.getYs(); if (ys && ys.length) return ys[0]; } catch (e) { /* 未描画 */ }
      }
      return stave.getYForLine(0);
    }

    /* 符頭中心Yに合わせた基準線を1本だけ、符頭の背面に引く。 */
    function drawBaseline(scoreEl, laneW, y) {
      const svg = scoreEl.querySelector('svg');
      if (!svg) return;
      const line = document.createElementNS(SVGNS, 'line');
      line.setAttribute('x1', 0); line.setAttribute('y1', y);
      line.setAttribute('x2', laneW); line.setAttribute('y2', y);
      line.setAttribute('stroke', '#7d93ab');
      line.setAttribute('stroke-width', '1.4');
      line.setAttribute('opacity', '0.7');
      svg.insertBefore(line, svg.firstChild); // 符頭より背面
    }

    /* PoC確認用ガイド：各セル中心の縦線と、実際の符頭中心位置のマーカー。
       ピン留めONなら、オレンジの点が水色の縦線（セル中心）の上に乗る。 */
    function drawGuides(scoreEl, nCells, height, items, baselineY) {
      const svg = scoreEl.querySelector('svg');
      if (!svg) return;
      const g = document.createElementNS(SVGNS, 'g');
      for (let i = 0; i < nCells; i++) {
        const cx = (i + 0.5) * CELL_W;
        const v = document.createElementNS(SVGNS, 'line');
        v.setAttribute('x1', cx); v.setAttribute('y1', 0);
        v.setAttribute('x2', cx); v.setAttribute('y2', height);
        v.setAttribute('stroke', '#4fa3ff'); v.setAttribute('stroke-width', '1');
        v.setAttribute('stroke-dasharray', '3 4'); v.setAttribute('opacity', '0.5');
        g.appendChild(v);
      }
      items.forEach(it => {
        if (it.isRest) return;
        let cy = baselineY;
        try { const ys = it.note.getYs(); if (ys && ys.length) cy = ys[0]; } catch (e) { /* noop */ }
        const dot = document.createElementNS(SVGNS, 'circle');
        dot.setAttribute('cx', noteHeadCenterX(it.note)); dot.setAttribute('cy', cy);
        dot.setAttribute('r', '2.6'); dot.setAttribute('fill', '#ff9f43');
        g.appendChild(dot);
      });
      svg.appendChild(g); // 最前面
    }

    // hit→↓/↑（実線）、rest/tie→(↓)/(↑)（括弧）、null→なし
    function strokeGlyph(cell) {
      const arrow = cell.dir === 'up' ? '↑' : (cell.dir === 'down' ? '↓' : null);
      if (cell.type === 'hit') return arrow || '<span class="none">·</span>';
      // rest / tie
      if (arrow == null) return '<span class="none">なし</span>';
      return '<span class="ghost">(' + arrow + ')</span>';
    }

    function buildDebug(conf, events, items, unit) {
      let s = 'grid=' + conf.grid + '  unit(8分/セル)=' + unit + '\n\n';
      s += 'events:\n';
      events.forEach((e, i) => {
        s += '  [' + i + '] ' + e.kind + '  cells=[' + e.cells.join(',') + ']  '
           + 'start=' + e.startEighths + '/8  dur=' + e.durEighths + '/8\n';
      });
      s += '\nVexFlow notes (拍分割後):\n';
      items.forEach((it, i) => {
        s += '  [' + i + '] ' + it.durStr + (it.tieToPrev ? '  <-tie' : '')
           + '  start=' + it.startEighths + '/8  len=' + it.len + '/8\n';
      });
      return s;
    }

    /* ---------- サンプル切替UI ---------- */
    const samplesEl = document.getElementById('samples');
    Object.keys(SAMPLES).forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'sample' + (key === current ? ' active' : '');
      btn.textContent = SAMPLES[key].name;
      btn.addEventListener('click', () => {
        current = key;
        [...samplesEl.children].forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      samplesEl.appendChild(btn);
    });
    document.getElementById('pin').addEventListener('change', render);
    document.getElementById('showgrid').addEventListener('change', render);
    document.getElementById('guides').addEventListener('change', render);

    render();
  })();
  </script>
</body>
</html>
