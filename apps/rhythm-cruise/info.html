<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>リズムクルーズ | インフォメーション</title>
    <link rel="stylesheet" href="./theme.css?v=1.0.8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
</head>

<body class="rc-info-page" data-rc-theme="clean-pro">
    <div class="app-container">
        <main class="rc-info-card">
            <div class="rc-info-nav">
                <a class="nav-btn rc-info-nav-link" href="./index.html" id="rc-info-back-link">← 戻る</a>
                <a class="nav-btn rc-info-nav-link rc-info-home-link" href="./index.html" id="rc-info-home-link"
                    aria-label="ホーム画面" title="ホーム画面">🏠</a>
            </div>

            <h1 class="rc-info-title">インフォメーション</h1>

            <div class="rc-info-menu">
                <a class="rc-info-link-card" href="https://youtu.be/m0a4IAK5N9E" target="_blank" rel="noopener noreferrer" data-youtube-confirm id="rc-info-video-link">
                    <span class="rc-info-link-title">【動画】正しい使い方と初期設定</span>
                </a>
            </div>

            <div class="rc-info-usage-row">
                <a class="rc-info-simple-link" href="./usage.html" id="rc-info-usage-link">基本的な使い方</a>
            </div>

            <nav class="rc-info-footer-links" aria-label="法務・お問い合わせ">
                <a href="./terms.html" id="terms-link">利用規約</a>
                <a href="./privacy.html" id="privacy-link">プライバシーポリシー</a>
                <a href="mailto:soundcruise.inc@gmail.com">お問い合わせ</a>
            </nav>
        </main>
    </div>

    <div class="rc-info-youtube-confirm" id="rc-youtube-confirm" hidden>
        <div class="rc-info-youtube-confirm__dialog" role="dialog" aria-modal="true" aria-labelledby="rc-youtube-confirm-title">
            <h2 class="rc-info-youtube-confirm__title" id="rc-youtube-confirm-title">YouTubeを開きます</h2>
            <p class="rc-info-youtube-confirm__body">アプリを離れて、YouTubeページを開きます。<br>よろしいですか？</p>
            <div class="rc-info-youtube-confirm__actions">
                <button type="button" class="rc-info-youtube-confirm__btn rc-info-youtube-confirm__btn--cancel" id="rc-youtube-confirm-cancel">キャンセル</button>
                <button type="button" class="rc-info-youtube-confirm__btn rc-info-youtube-confirm__btn--open" id="rc-youtube-confirm-open">YouTubeを開く</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var backLink = document.getElementById('rc-info-back-link');
            var homeLink = document.getElementById('rc-info-home-link');
            var defaultHome = './index.html';
            var proHome = './pro_a9f4k7q2m8z/index.html';
            var editionHomeStorageKey = 'rhythmCruiseEditionHome';
            var currentUrl = new URL(window.location.href);
            var editionParam = currentUrl.searchParams.get('edition');

            function normalizeEditionHome(urlLike) {
                if (!urlLike) return '';
                try {
                    var url = new URL(urlLike, window.location.href);
                    var basePath = new URL('./', window.location.href).pathname;
                    if (url.origin !== window.location.origin || url.pathname.indexOf(basePath) !== 0) return '';
                    var relativePath = url.pathname.slice(basePath.length);
                    if (relativePath === '' || /^index\.html$/i.test(relativePath)) {
                        return new URL(defaultHome, window.location.href).href;
                    }
                    if (/^pro_a9f4k7q2m8z\/(?:index\.html)?$/i.test(relativePath)) {
                        return new URL(proHome, window.location.href).href;
                    }
                    return '';
                } catch (error) {
                    return '';
                }
            }

            function rememberEditionHome(homePath) {
                var normalizedHome = normalizeEditionHome(homePath);
                if (!normalizedHome) return '';
                try { sessionStorage.setItem(editionHomeStorageKey, normalizedHome); } catch (error) {}
                return normalizedHome;
            }

            function getStoredEditionHome() {
                try { return normalizeEditionHome(sessionStorage.getItem(editionHomeStorageKey)); } catch (error) { return ''; }
            }

            function isProHomePath(homePath) {
                var normalizedHome = normalizeEditionHome(homePath);
                return normalizedHome ? /\/pro_a9f4k7q2m8z\/index\.html$/i.test(new URL(normalizedHome).pathname) : false;
            }

            function resolveHomePath() {
                if (editionParam === 'standard') return rememberEditionHome(defaultHome) || defaultHome;
                var referrerHome = normalizeEditionHome(document.referrer);
                if (referrerHome) return rememberEditionHome(referrerHome);
                var storedHome = getStoredEditionHome();
                if (editionParam === 'pro') return isProHomePath(storedHome) ? storedHome : defaultHome;
                return storedHome || defaultHome;
            }

            var homePath = resolveHomePath();
            var resolvedEdition = isProHomePath(homePath) ? 'pro' : 'standard';
            homeLink.href = homePath;
            document.getElementById('rc-info-usage-link').href = './usage.html?edition=' + encodeURIComponent(resolvedEdition);
            document.getElementById('terms-link').href = './terms.html?edition=' + encodeURIComponent(resolvedEdition);
            document.getElementById('privacy-link').href = './privacy.html?edition=' + encodeURIComponent(resolvedEdition);

            backLink.addEventListener('click', function (event) {
                if (currentUrl.searchParams.get('from') === 'home') {
                    event.preventDefault();
                    window.location.href = homePath;
                    return;
                }
                if (window.history.length > 1 && document.referrer) {
                    event.preventDefault();
                    window.history.back();
                    return;
                }
                backLink.href = homePath;
            });

            var youtubeConfirm = document.getElementById('rc-youtube-confirm');
            var youtubeCancel = document.getElementById('rc-youtube-confirm-cancel');
            var youtubeOpen = document.getElementById('rc-youtube-confirm-open');
            var pendingYoutubeUrl = '';

            function openYoutubeConfirm(url) {
                pendingYoutubeUrl = url;
                youtubeConfirm.hidden = false;
                youtubeOpen.focus();
            }

            function closeYoutubeConfirm() {
                pendingYoutubeUrl = '';
                youtubeConfirm.hidden = true;
            }

            document.querySelectorAll('[data-youtube-confirm]').forEach(function (a) {
                a.addEventListener('click', function (event) {
                    event.preventDefault();
                    openYoutubeConfirm(this.href);
                });
            });

            youtubeCancel.addEventListener('click', closeYoutubeConfirm);
            youtubeConfirm.addEventListener('click', function (event) {
                if (event.target === youtubeConfirm) {
                    closeYoutubeConfirm();
                }
            });
            youtubeOpen.addEventListener('click', function () {
                if (pendingYoutubeUrl) {
                    window.location.href = pendingYoutubeUrl;
                }
            });
            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape' && !youtubeConfirm.hidden) {
                    closeYoutubeConfirm();
                }
            });
        }());
    </script>
</body>

</html>
