<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>指板クルーズ</title>
    
    <link rel="manifest" href="manifest.json?v=standard-orientation-any-20260516">
    <link rel="apple-touch-icon" href="../generated-home-icons/standard-selected-icon/fretboard-cruise-standard-selection-180.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../shared/style.css?v=97">
    <link rel="stylesheet" href="../../shared/pro-theme.css?v=98">
    <link rel="stylesheet" href="../theme.css?v=406">

    <style>
        .app-loading-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 50% 30%, rgba(54, 211, 191, 0.18), transparent 38%),
                linear-gradient(160deg, #071522 0%, #0b2430 52%, #031018 100%);
            color: #fff;
            transition: opacity 240ms ease, visibility 240ms ease;
        }

        .app-loading-screen.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .app-loading-screen__inner {
            text-align: center;
            padding: 24px;
        }

        .app-loading-screen__brand {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .app-loading-screen__sub {
            margin-top: 8px;
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            color: rgba(245, 215, 140, 0.9);
        }

        .app-loading-screen__text {
            margin-top: 22px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.78);
        }

        .standard-pro-access-inline-link {
            display: inline;
            color: inherit;
            font: inherit;
            font-weight: inherit;
            line-height: inherit;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }

        .standard-pro-access-inline-link:focus-visible {
            outline: 2px solid rgba(255, 244, 176, 0.95);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <!-- App Loading Screen -->
    <div id="app-loading-screen" class="app-loading-screen">
        <div class="app-loading-screen__inner">
            <div class="app-loading-screen__brand">指板クルーズ</div>
            <div class="app-loading-screen__sub">Fretboard Cruise</div>
            <div class="app-loading-screen__text">クルージングの準備中…</div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" class="app-container">
        <!-- Dynamic content will be rendered here by script.js -->
    </div>

    <!-- Update Bar -->
    <div id="in-game-refresh-bar" class="in-game-refresh-bar hidden">
        <span id="app-version-display" class="app-version-display"></span>
        <button type="button" class="btn-secondary btn-in-game-refresh js-reload-app">ページを更新</button>
    </div>

    <script src="../script.js?v=2.8.3"></script>
    <script>
        (function () {
            var app = document.getElementById('app');
            if (!app) return;

            function linkProEditionText() {
                app.querySelectorAll('.fretboard-edition-notice').forEach(function (notice) {
                    var walker = document.createTreeWalker(notice, NodeFilter.SHOW_TEXT);
                    var textNodes = [];
                    var textNode;

                    while ((textNode = walker.nextNode())) {
                        if (textNode.parentElement.closest('a, script, style')) continue;
                        if (textNode.nodeValue.indexOf('PRO版') !== -1) textNodes.push(textNode);
                    }

                    textNodes.forEach(function (node) {
                        var fragment = document.createDocumentFragment();
                        var text = node.nodeValue;
                        var start = 0;
                        var index;

                        while ((index = text.indexOf('PRO版', start)) !== -1) {
                            fragment.appendChild(document.createTextNode(text.slice(start, index)));

                            var link = document.createElement('a');
                            link.href = '../pro-access.html';
                            link.className = 'standard-pro-access-inline-link';
                            link.textContent = 'PRO版';
                            fragment.appendChild(link);

                            start = index + 'PRO版'.length;
                        }

                        fragment.appendChild(document.createTextNode(text.slice(start)));
                        node.parentNode.replaceChild(fragment, node);
                    });
                });
            }

            linkProEditionText();

            if (!window.MutationObserver) return;

            var observer = new MutationObserver(function (mutations) {
                var hasAddedNodes = mutations.some(function (mutation) {
                    return mutation.type === 'childList' && mutation.addedNodes.length > 0;
                });
                if (hasAddedNodes) linkProEditionText();
            });

            observer.observe(app, { childList: true });
        }());

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
