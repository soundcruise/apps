<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>指板クルーズ</title>
    
    <link rel="manifest" href="manifest.json?v=standardicon-20260514">
    <link rel="apple-touch-icon" href="../generated-home-icons/standard-selected-icon/fretboard-cruise-standard-selection-180.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../shared/style.css?v=97">
    <link rel="stylesheet" href="../../shared/pro-theme.css?v=98">
    <!-- 動作確認用: URL に ?legacy=1.130.2 を付けると legacy/v1.130.2 の theme を読み込み -->
    <script>
    (function () {
        var root = '../';
        try {
            if (new URLSearchParams(location.search).get('legacy') === '1.130.2') {
                root = '../legacy/v1.130.2/';
            }
        } catch (e) { /* ignore */ }
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = root + (root === '../' ? 'theme.css?v=381' : 'theme.css');
        document.head.appendChild(link);
    })();
    </script>
</head>
<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        <!-- Dynamic content will be rendered here by script.js -->
    </div>

    <!-- Update Bar -->
    <div id="in-game-refresh-bar" class="in-game-refresh-bar hidden">
        <span id="app-version-display" class="app-version-display"></span>
        <button type="button" class="btn-secondary btn-in-game-refresh js-reload-app">ページを更新</button>
    </div>

    <!-- 動作確認用: URL に ?legacy=1.130.2 を付けると legacy/v1.130.2 の script を読み込み -->
    <script>
    (function () {
        var root = '../';
        try {
            if (new URLSearchParams(location.search).get('legacy') === '1.130.2') {
                root = '../legacy/v1.130.2/';
            }
        } catch (e) { /* ignore */ }
        var s = document.createElement('script');
        s.src = root + (root === '../' ? 'script.js?v=1.141.20' : 'script.js');
        s.async = false;
        document.body.appendChild(s);
    })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
