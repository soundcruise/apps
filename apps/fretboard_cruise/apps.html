<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>指板クルーズ | アプリシリーズ</title>
    <link rel="stylesheet" href="../shared/style.css?v=97">
    <link rel="stylesheet" href="../shared/pro-theme.css?v=98">
    <link rel="stylesheet" href="./theme.css?v=404">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        .fret-apps-page {
            min-height: 100vh;
            overflow: auto;
        }

        .fret-apps-page .app-container {
            max-width: 720px;
            min-height: 100vh;
            justify-content: center;
            padding-top: max(32px, calc(env(safe-area-inset-top) + 24px));
            padding-bottom: max(32px, calc(env(safe-area-inset-bottom) + 24px));
        }

        .fret-apps-card {
            width: 100%;
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
        }

        .fret-apps-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .fret-apps-nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            height: 38px;
            padding: 0 12px;
            gap: 6px;
            font-size: 0.86rem;
            line-height: 1;
            text-decoration: none;
        }

        .fret-apps-title {
            margin: 0 0 20px;
            color: #fff;
            font-size: 1.8rem;
            line-height: 1.12;
            letter-spacing: 0;
            text-align: center;
        }

        .fret-apps-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .fret-apps-link-card {
            display: block;
            width: 100%;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.05);
            text-decoration: none;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .fret-apps-link-title {
            display: block;
            padding-right: 24px;
            font-size: 0.96rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .fret-apps-link-note {
            display: block;
            margin-top: 6px;
            color: rgba(255, 255, 255, 0.66);
            font-size: 0.72rem;
            line-height: 1.45;
        }

        @media (hover: hover) {
            .fret-apps-link-card:hover {
                transform: translateY(-2px);
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.28);
            }
        }

        @media (max-width: 480px) {
            .fret-apps-card {
                padding: 28px 18px;
                border-radius: 20px;
            }

            .fret-apps-title {
                font-size: 1.55rem;
            }

            .fret-apps-nav-link {
                height: 36px;
                padding: 0 10px;
                font-size: 0.8rem;
            }

            .fret-apps-link-title {
                font-size: 0.88rem;
            }

            .fret-apps-link-note {
                font-size: 0.66rem;
            }
        }
    </style>
</head>

<body class="fret-apps-page">
    <div class="app-container">
        <main class="fret-apps-card">
            <div class="fret-apps-nav">
                <a class="icon-btn fret-apps-nav-link" href="./info.html" id="fret-apps-back-link">← 戻る</a>
            </div>

            <h1 class="fret-apps-title">アプリシリーズ</h1>

            <div class="fret-apps-links">
                <a class="fret-apps-link-card" href="https://soundcruise.jp/apps/pitch-cruise/standard/" target="_blank" rel="noopener noreferrer">
                    <span class="fret-apps-link-title">音感クルーズ</span>
                    <span class="fret-apps-link-note">耳コピに必要な音感を、クイズ形式でトレーニングできます。</span>
                </a>
            </div>
        </main>
    </div>

    <script>
        (function () {
            var backLink = document.getElementById('fret-apps-back-link');

            backLink.addEventListener('click', function (event) {
                if (window.history.length > 1 && document.referrer) {
                    event.preventDefault();
                    window.history.back();
                }
            });

            if (window.navigator.standalone) {
                document.querySelectorAll('a[target="_blank"]').forEach(function (a) {
                    a.addEventListener('click', function (event) {
                        event.preventDefault();
                        window.location.href = this.href;
                    });
                });
            }
        }());
    </script>
</body>

</html>
