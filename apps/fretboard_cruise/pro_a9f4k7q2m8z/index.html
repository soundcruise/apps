    <script>
        window.__SOUNDCRUISE_PRO_GATE__ = { passwordHash: 'fa68d2ed5f32f14746be3ce92a07e5dcc7431b3ac4e7717b6947a4054fae5c18', gateVersion: 8 };
    </script>
    <script src="../../shared/pro-gate.js?v=18"></script>
    <script>
    (function () {
        function insertTroubleshootLink() {
            var section = document.querySelector('.pro-gate-password-section');
            if (!section) return false;
            if (section.querySelector('.pro-gate-troubleshoot-link')) return true;

            var linkWrap = document.createElement('div');
            linkWrap.className = 'pro-gate-troubleshoot-link';
            linkWrap.innerHTML = '<a href="./troubleshoot.html">メンバーなのに見られない方</a>';

            var updated = section.querySelector('.pro-gate-password-updated');
            if (updated && updated.parentNode === section) {
                updated.insertAdjacentElement('afterend', linkWrap);
            } else {
                section.appendChild(linkWrap);
            }
            return true;
        }

        function watchGate() {
            if (insertTroubleshootLink()) return;
            var observer = null;
            var attempts = 0;

            if (window.MutationObserver) {
                observer = new MutationObserver(function () {
                    if (insertTroubleshootLink() && observer) {
                        observer.disconnect();
                    }
                });
                observer.observe(document.body || document.documentElement, { childList: true, subtree: true });
            }

            var timer = window.setInterval(function () {
                attempts += 1;
                if (insertTroubleshootLink() || attempts >= 20) {
                    window.clearInterval(timer);
                    if (observer) observer.disconnect();
                }
            }, 100);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () {
                window.requestAnimationFrame(watchGate);
            });
        } else {
            window.requestAnimationFrame(watchGate);
        }
    })();
    </script>

    <!-- 動作確認用: URL に ?legacy=1.130.2 を付けると legacy/v1.130.2 の script を読み込み -->
    <script>
    (function () {
        var root = '../';
        var isStagingPreview = false;
        try {
            var params = new URLSearchParams(location.search);
            isStagingPreview = params.get('stagingPreview') === '1';
            if (params.get('legacy') === '1.130.2') {
                root = '../legacy/v1.130.2/';
            }
        } catch (e) { /* ignore */ }
        var s = document.createElement('script');
        if (isStagingPreview && root === '../') {
            s.src = '../script-staging.js?v=staging-gr-draft-20260530';
        } else {
            s.src = root + (root === '../' ? 'script.js?v=2.6.1' : 'script.js');
        }
        s.async = false;
        document.body.appendChild(s);
    })();
    </script>
    <script>

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }
