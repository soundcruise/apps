<!DOCTYPE html>
<html lang="ja" data-app-edition="Beta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>音感クルーズ ベータ</title>
    <link rel="stylesheet" href="../../shared/style.css?v=99">
    <link rel="stylesheet" href="../theme.css?v=2">
    <link rel="stylesheet" href="../staging/staging-hub-nav.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json?v=5">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="beta_pwa_192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js', { scope: './' })
                .then(() => console.log('Service Worker Registered (beta)'));
        }
    </script>
</head>

<body>
    <div class="app-container">
        <header>
            <div
                style="position: absolute; top: max(20px, env(safe-area-inset-top)); left: max(20px, env(safe-area-inset-left)); display: flex; gap: 8px; align-items: center;">
                <button id="stage-select-btn" class="icon-btn">← 戻る</button>
                <button id="top-btn" class="icon-btn">🏠 TOP</button>
            </div>
            <h1>音感クルーズ <span style="font-size:0.65em;font-weight:600;opacity:0.85;">ベータ</span></h1>
            <div id="stage-info-display" style="text-align: center; margin-bottom: 10px; display: none;">
                <div id="current-stage-name" style="font-size: 1.2rem; font-weight: bold; color: var(--primary-color);">
                </div>
                <div id="current-stage-desc" style="font-size: 0.9rem; color: rgba(255, 255, 255, 0.7);"></div>
            </div>
            <button id="settings-btn" class="icon-btn"
                style="position: absolute; top: max(20px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right));"
                title="設定">⚙️</button>
            <div class="stats">
                <div class="stat-item" style="min-width: 80px;">
                    <span class="label">Combo</span>
                    <span id="combo" class="value">0</span>
                </div>
            </div>

        </header>

        <main>
            <div class="feedback-display" id="feedback">Listen...</div>

            <div id="test-mode-status-bar" class="test-mode-status-bar hidden">
                <span class="test-mode-label">TEST MODE</span>
                <span id="test-mode-progress">0 / 20</span>
                <span id="test-mode-timer" class="test-mode-timer">--</span>
            </div>

            <div class="action-btns">
                <button id="replay-btn" class="icon-btn" aria-label="問題を聴く" title="問題をもう1度聴く（音階なし）">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 .49-3.5" />
                    </svg>
                    <span>問題</span>
                </button>

                <button id="tonic-btn" class="icon-btn" aria-label="Play Tonic" title="主音(ド)を確認">
                    <span>🎵 ド</span>
                </button>

                <button id="scale-btn" class="icon-btn" aria-label="音階を聴く" title="ドレミファソラシドを聴く">
                    <span>🎼 音階</span>
                </button>
            </div>

            <div class="note-buttons" id="note-buttons-container">
                <!-- Dynamically populated in script.js -->
            </div>



            <div class="chord-buttons">
                <button class="chord-btn" data-chord="C">C</button>
                <button class="chord-btn" data-chord="Dm">Dm</button>
                <button class="chord-btn" data-chord="Em">Em</button>
                <button class="chord-btn" data-chord="F">F</button>
                <button class="chord-btn" data-chord="G">G</button>
                <button class="chord-btn" data-chord="Am">Am</button>
            </div>
            <div class="control-buttons-wrapper" style="margin-top: 15px; display: flex; justify-content: center;">
                <label class="answer-toggle-label"
                    style="display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.06); padding: 6px 14px; border-radius: 50px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; -webkit-tap-highlight-color: transparent; opacity: 0.7;">
                    <div class="toggle-switch small">
                        <input type="checkbox" id="answer-mode-toggle" checked>
                        <span class="toggle-slider"></span>
                    </div>
                    <span id="answer-mode-status"
                        style="font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.8);">回答ON</span>
                </label>
            </div>

            <div id="standard-pro-preview-notice" style="display: none; margin-top: 20px; text-align: center;">
                <a href="../pro-access.html" style="display: inline-block; padding: 10px 16px; background: linear-gradient(90deg, #ffd25a 0%, #ffb900 100%); color: #000; text-decoration: none; border-radius: 8px; font-size: 0.88rem; font-weight: 600; transition: all 0.3s ease;">Pro版はこちら</a>
            </div>

            <div id="in-game-refresh-bar" class="in-game-refresh-bar" aria-label="バージョンとページの再読み込み">
                <span id="app-version-display" class="app-version-display"></span>
                <button type="button" class="btn-secondary btn-in-game-refresh js-reload-app">ページを更新</button>
            </div>

        </main>

        <div id="overlay" class="overlay">
            <!-- Screen 1: ホーム -->
            <div id="screen-home" class="modal" style="position: relative;">
                <button id="home-settings-btn" class="icon-btn"
                    style="position: absolute; top: max(20px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); z-index: 100;"
                    title="設定">⚙️</button>
                <h2 class="home-title">音感クルーズ</h2>
                <p class="beta-home-note"
                    style="text-align:center;font-size:0.88rem;color:rgba(255,255,255,0.55);margin:0 0 18px;line-height:1.45;">
                    お試しベータ</p>
                <div class="category-cards">
                    <button class="category-card" id="btn-category-melody">
                        <span class="category-card-icon">🎵</span>
                        <span class="category-card-label">メロディ音感</span>
                        <span class="category-card-sub">単音の聴き取り</span>
                    </button>
                    <button class="category-card" id="btn-category-chord">
                        <span class="category-card-icon"><svg aria-hidden="true" focusable="false" data-prefix="fas"
                                data-icon="guitar" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"
                                style="height: 1em; width: 1em; vertical-align: -0.125em; fill: currentColor;">
                                <path fill="currentColor"
                                    d="M502.63 39L473 9.37a32 32 0 0 0-45.26 0L381.46 55.7a35.14 35.14 0 0 0-8.53 13.79L360.77 106l-76.26 76.26c-12.16-8.76-25.5-15.74-40.1-19.14-33.45-7.78-67-.88-89.88 22a82.45 82.45 0 0 0-20.24 33.47c-6 18.56-23.21 32.69-42.15 34.46-23.7 2.27-45.73 11.45-62.61 28.44C-16.11 327-7.9 409 47.58 464.45S185 528 230.56 482.52c17-16.88 26.16-38.9 28.45-62.71 1.76-18.85 15.89-36.13 34.43-42.14a82.6 82.6 0 0 0 33.48-20.25c22.87-22.88 29.74-56.36 22-89.75-3.39-14.64-10.37-28-19.16-40.2L406 151.23l36.48-12.16a35.14 35.14 0 0 0 13.79-8.53l46.33-46.32a32 32 0 0 0 .03-45.22zM208 352a48 48 0 1 1 48-48 48 48 0 0 1-48 48z">
                                </path>
                            </svg></span>
                        <span class="category-card-label">コード音感</span>
                        <span class="category-card-sub">コード進行の聴き取り</span>
                    </button>
                </div>
            </div>

            <!-- Screen 2: メロディ ステージ選択 -->
            <div id="screen-melody" class="modal hidden" style="position: relative;">
                <button id="melody-settings-btn" class="icon-btn"
                    style="position: absolute; top: max(20px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); z-index: 100;"
                    title="設定">⚙️</button>
                <div
                    style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;">
                    <button class="btn-back" id="btn-back-melody" style="margin-bottom: 0;">←
                        戻る</button>
                </div>
                <h2 class="home-title">🎵 メロディ音感</h2>
                <div class="level-buttons" style="margin-top: 24px;">
                    <button id="btn-level-1" class="btn-primary" data-stage="1">Stage 1 <span
                            class="stage-desc">ドミソ</span></button>
                    <button id="btn-level-2" class="btn-primary" data-stage="2">Stage 2 <span
                            class="stage-desc">ドミソシ</span></button>
                    <button id="btn-level-3" class="btn-primary" data-stage="3">Stage 3 <span
                            class="stage-desc">ドミファソシ</span></button>
                    <button id="btn-level-4" class="btn-primary" data-stage="4">Stage 4 <span class="stage-desc">1音
                            (全７音)</span></button>
                </div>
            </div>

            <!-- Screen 3: コード ステージ選択 -->
            <div id="screen-chord" class="modal hidden" style="position: relative;">
                <button id="chord-settings-btn" class="icon-btn"
                    style="position: absolute; top: max(20px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); z-index: 100;"
                    title="設定">⚙️</button>
                <div
                    style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px;">
                    <button class="btn-back" id="btn-back-chord" style="margin-bottom: 0;">←
                        戻る</button>
                </div>
                <h2 class="home-title"><svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="guitar"
                        role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"
                        style="height: 1em; width: 1em; vertical-align: -0.125em; fill: currentColor;">
                        <path fill="currentColor"
                            d="M502.63 39L473 9.37a32 32 0 0 0-45.26 0L381.46 55.7a35.14 35.14 0 0 0-8.53 13.79L360.77 106l-76.26 76.26c-12.16-8.76-25.5-15.74-40.1-19.14-33.45-7.78-67-.88-89.88 22a82.45 82.45 0 0 0-20.24 33.47c-6 18.56-23.21 32.69-42.15 34.46-23.7 2.27-45.73 11.45-62.61 28.44C-16.11 327-7.9 409 47.58 464.45S185 528 230.56 482.52c17-16.88 26.16-38.9 28.45-62.71 1.76-18.85 15.89-36.13 34.43-42.14a82.6 82.6 0 0 0 33.48-20.25c22.87-22.88 29.74-56.36 22-89.75-3.39-14.64-10.37-28-19.16-40.2L406 151.23l36.48-12.16a35.14 35.14 0 0 0 13.79-8.53l46.33-46.32a32 32 0 0 0 .03-45.22zM208 352a48 48 0 1 1 48-48 48 48 0 0 1-48 48z">
                        </path>
                    </svg> <span>コード音感</span></h2>

                <div class="chord-mode-toggle"
                    style="margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 15px;">
                    <label class="radio-label" style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
                        <input type="radio" name="chord-pattern-mode" value="progression" checked>
                        <span>頻出コード進行</span>
                    </label>
                    <label class="radio-label" style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
                        <input type="radio" name="chord-pattern-mode" value="random">
                        <span>完全ランダム</span>
                    </label>
                </div>

                <div class="level-buttons" style="margin-top: 24px;">
                    <button id="btn-level-101" class="btn-primary" data-stage="101">STAGE 1<br><span
                            class="stage-desc">C, F, G (2和音)</span></button>
                    <button id="btn-level-102" class="btn-primary" data-stage="102">STAGE 2<br><span
                            class="stage-desc">C, F, G (3和音)</span></button>
                    <button id="btn-level-103" class="btn-primary" data-stage="103">STAGE 3<br><span
                            class="stage-desc">C, F, G, Am (2和音)</span></button>
                    <button id="btn-level-104" class="btn-primary" data-stage="104">STAGE 4<br><span
                            class="stage-desc">C, F, G, Am (3和音)</span></button>
                </div>
            </div>
        </div>



        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden">
            <div class="modal-content">
                <h2>設定</h2>

                <div class="setting-item">
                    <label>音名表記</label>
                    <select id="notation-selector" class="preset-select">
                        <option value="doremi" selected>ドレミ</option>
                        <option value="cde">CDE</option>
                        <option value="degree">度数</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>楽器</label>
                    <select id="instrument-selector" class="preset-select">
                        <option value="acoustic_guitar">アコースティックギター</option>
                        <option value="piano">電子ピアノ</option>
                        <option value="violin">バイオリン</option>
                        <option value="electric_guitar">エレキギター</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="scale-toggle">問題前の音階</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="scale-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label for="test-mode-toggle">テストモード</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="test-mode-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="settings-pro-only-block" aria-label="Pro版専用の設定">
                    <div class="settings-pro-only-banner">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="pro-only-settings-badge">PRO</span>
                            <span class="settings-pro-only-text">Pro版で変更できます(通常版は固定です)</span>
                        </div>
                        <a href="../pro-access.html" style="color: rgba(255, 214, 94, 0.9); font-size: 0.75rem; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; margin-top: 6px; display: inline-block;">Pro版の入手はこちら</a>
                    </div>
                    <div class="setting-item settings-pro-only-row">
                        <label>基準オクターブ</label>
                        <div class="octave-control">
                            <button type="button" id="octave-down" class="btn-sm" disabled aria-disabled="true">-</button>
                            <span id="current-octave">3</span>
                            <button type="button" id="octave-up" class="btn-sm" disabled aria-disabled="true">+</button>
                        </div>
                    </div>
                    <div class="setting-item settings-pro-only-row">
                        <label>キー</label>
                        <div class="key-selector-control-wrap">
                            <select id="key-selector" class="preset-select" disabled aria-disabled="true">
                                <option value="0">C</option>
                                <option value="1">C# / D♭</option>
                                <option value="2">D</option>
                                <option value="3">D# / E♭</option>
                                <option value="4">E</option>
                                <option value="5">F</option>
                                <option value="6">F# / G♭</option>
                                <option value="7">G</option>
                                <option value="8">G# / A♭</option>
                                <option value="9">A</option>
                                <option value="10">A# / B♭</option>
                                <option value="11">B</option>
                            </select>
                            <span id="key-random-display" class="key-random-display hidden" aria-hidden="true">ランダム</span>
                        </div>
                    </div>
                    <div class="setting-item settings-pro-only-row">
                        <label for="key-random-toggle" title="Pro版で利用できます">キーランダム</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="key-random-toggle" disabled aria-disabled="true">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item vertical settings-pro-only-row">
                        <label for="hz-slider">基準周波数 (A4): <span id="current-hz">440</span>Hz</label>
                        <input type="range" id="hz-slider" class="hz-slider sustain-slider" min="430" max="450" step="1"
                            value="440" disabled aria-disabled="true">
                    </div>
                    <div class="setting-item vertical settings-pro-only-row">
                        <label><span>余韻の長さ</span>: <span id="sustain-value">0.5</span><span>秒</span></label>
                        <input type="range" id="sustain-slider" min="0.01" max="1.0" step="0.01" value="0.5"
                            class="sustain-slider" disabled aria-disabled="true">
                    </div>
                    <div class="setting-item vertical settings-pro-only-row">
                        <label><span>問題のスピード</span>: <span id="speed-value">1.0</span>x</label>
                        <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0"
                            class="sustain-slider" disabled aria-disabled="true">
                    </div>
                </div>

                <div class="settings-modal-footer">
                    <div class="settings-modal-actions">
                        <button type="button" id="preview-sound" class="btn-preview">🎵 音を確認</button>
                        <button type="button" id="confirm-settings" class="btn-primary">決定</button>
                    </div>
                    <div class="settings-modal-actions settings-modal-actions--secondary">
                        <button type="button" id="reset-settings" class="btn-secondary">デフォルトに戻す</button>
                        <button type="button" id="cancel-settings" class="btn-secondary">キャンセル</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="app-update-banner" class="app-update-banner hidden" role="status" aria-live="polite">
            <span class="app-update-banner-text">新しい版があります。再読み込みで反映されます。</span>
            <button type="button" id="app-update-reload-btn" class="btn-primary btn-banner-reload">再読み込み</button>
            <button type="button" id="app-update-dismiss-btn" class="btn-banner-dismiss" aria-label="閉じる">×</button>
        </div>
    </div>
    <script src="../staging/staging-hub-nav.js?v=3"></script>
    <script src="../script.js?v=2.4.0"></script>
</body>

</html>
