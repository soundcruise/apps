<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>音感クルーズ | インフォメーション</title>
    <link rel="stylesheet" href="../shared/style.css?v=97">
    <link rel="stylesheet" href="../shared/pro-theme.css?v=98">
    <link rel="stylesheet" href="./theme.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
</head>

<body class="info-page">
    <div class="app-container">
        <main class="info-card">
            <div class="info-nav">
                <div class="info-nav-group">
                    <a class="icon-btn info-nav-link" href="./standard/index.html" id="info-back-link">← 戻る</a>
                </div>
                <div class="info-nav-group">
                    <a class="icon-btn info-nav-link" href="./standard/index.html" id="info-home-link" aria-label="ホーム画面"
                        title="ホーム画面">🏠</a>
                </div>
            </div>
            <h1>インフォメーション</h1>
            <div class="info-links">
                <a class="info-link-card info-link-card--primary" id="first-link" href="https://youtu.be/a-gLbJ0_Cvc?t=78" target="_blank" rel="noopener noreferrer">
                    <span class="info-link-title">【動画】最短でクリアする3つのコツ</span>
                    <span class="info-link-note">※感想や要望などもこちらにコメントしてください♪</span>
                </a>
                <a class="info-link-card info-link-card--compact" id="pro-usage-link" href="https://youtu.be/6GUBv8i4dq4" target="_blank" rel="noopener noreferrer" style="display: none; width: 100%; max-width: 100%;">
                    <span class="info-link-title">【動画】PRO版の使い方</span>
                </a>
                <a class="info-link-card recommended-link-with-badge" href="./recommended-videos.html" id="recommended-videos-link">
                    <span class="info-link-title">おすすめの関連動画リスト</span>
                    <span id="recommended-videos-new-badge" class="info-new-badge recommended-link-new-badge hidden" aria-hidden="true">New</span>
                </a>
                <a class="info-link-card info-link-card--compact" href="https://www.youtube.com/channel/UC4ncQuk56I8SK6lJGZcGwJQ"
                    target="_blank" rel="noopener noreferrer">
                    <span class="info-link-title">YouTube Chトップ</span>
                </a>
            </div>
        </main>
    </div>
    <script>
        (function () {
            var backLink = document.getElementById('info-back-link');
            var homeLink = document.getElementById('info-home-link');
            var defaultHome = './standard/index.html';
            var currentUrl = new URL(window.location.href);
            var fromHome = currentUrl.searchParams.get('from') === 'home';
            var editionParam = currentUrl.searchParams.get('edition');
            var recommendedNewBadge = document.getElementById('recommended-videos-new-badge');
            var recommendedNewKey = 'pitchCruiseRecommendedNewSeen';

            function resolveHomePath() {
                if (editionParam === 'pro') return './pro_x9v7q2m8/index.html';
                if (editionParam === 'standard') return './standard/index.html';
                try {
                    var referrerUrl = document.referrer ? new URL(document.referrer) : null;
                    if (referrerUrl && referrerUrl.origin === window.location.origin) {
                        if (referrerUrl.pathname.indexOf('/pro_x9v7q2m8/') !== -1) {
                            return './pro_x9v7q2m8/index.html';
                        }
                        if (referrerUrl.pathname.indexOf('/standard/') !== -1) {
                            return './standard/index.html';
                        }
                    }
                } catch (error) {
                    console.warn('Failed to resolve referrer for info navigation.', error);
                }
                return defaultHome;
            }

            var homePath = resolveHomePath();
            var isProEdition = editionParam === 'pro' || homePath.indexOf('/pro_x9v7q2m8/') !== -1;
            homeLink.href = homePath;
            var firstLink = document.getElementById('first-link');
            if (firstLink && isProEdition) {
                firstLink.classList.remove('info-link-card--primary');
                firstLink.classList.add('info-link-card--compact');
                firstLink.style.width = '100%';
                firstLink.style.maxWidth = '100%';
                firstLink.querySelector('.info-link-title').textContent = '【動画】通常版のクリアの仕方';
                var noteSpan = firstLink.querySelector('.info-link-note');
                if (noteSpan) {
                    noteSpan.remove();
                }
            }
            var proUsageLink = document.getElementById('pro-usage-link');
            if (proUsageLink && isProEdition) {
                proUsageLink.style.display = '';
            }
            var recommendedLink = document.getElementById('recommended-videos-link');
            if (recommendedLink && fromHome) {
                recommendedLink.href = './recommended-videos.html?from=home&edition=' + encodeURIComponent(editionParam || (isProEdition ? 'pro' : 'standard'));
            }
            if (recommendedNewBadge) {
                if (isProEdition) {
                    try {
                        if (localStorage.getItem(recommendedNewKey) !== '1') {
                            recommendedNewBadge.classList.remove('hidden');
                            localStorage.setItem(recommendedNewKey, '1');
                        }
                    } catch (error) {
                        recommendedNewBadge.classList.remove('hidden');
                    }
                } else {
                    recommendedNewBadge.style.display = 'none';
                }
            }

            backLink.addEventListener('click', function (event) {
                if (fromHome) {
                    event.preventDefault();
                    window.location.href = homePath;
                    return;
                }
                if (window.history.length > 1 && document.referrer) {
                    event.preventDefault();
                    window.history.back();
                    return;
                }
                backLink.href = homePath;
            });

            // On iOS standalone (home screen PWA), target="_blank" opens an in-app browser
            // in the same process, which associates YouTube audio with this app's audio session
            // and causes the Now Playing widget to appear on the lock screen.
            // Navigating via window.location.href triggers iOS to open the URL in external
            // Safari (a separate process), preventing the audio session leak.
            if (window.navigator.standalone) {
                document.querySelectorAll('a[target="_blank"]').forEach(function (a) {
                    a.addEventListener('click', function (e) {
                        e.preventDefault();
                        window.location.href = this.href;
                    });
                });
            }
        }());
    </script>
</body>

</html>
