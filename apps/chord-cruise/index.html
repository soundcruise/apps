<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>コードクルーズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css?v=0.13.0">
</head>
<body>
<div id="cc-app" class="cc-app">
    <nav id="cc-nav" class="cc-nav cc-nav--hidden" aria-hidden="true">
        <button type="button" id="cc-nav-back" class="cc-nav-btn">← 戻る</button>
        <button type="button" id="cc-nav-top" class="cc-nav-btn">🏠 TOP</button>
    </nav>
    <button type="button" id="cc-settings-btn" class="cc-settings-corner-btn" aria-haspopup="dialog" aria-controls="cc-settings-overlay">
        <span class="cc-settings-gear" aria-hidden="true">⚙️</span> 設定
    </button>
    <main class="cc-main">
        <!-- TOP画面 -->
        <section id="cc-screen-home" class="cc-screen">
            <header class="cc-home-header">
                <h1 class="cc-home-title">コードクルーズ</h1>
                <p class="cc-home-subtitle">CHORD CRUISE</p>
                <p class="cc-home-tagline">キーから探して、指板で確かめて、自分のコード本棚へ。</p>
            </header>
            <div class="cc-home-actions">
                <button type="button" class="cc-action-card" id="cc-go-explore">
                    <span class="cc-action-card-icon">🔍</span>
                    <span class="cc-action-card-body">
                        <span class="cc-action-card-label">コードを調べる</span>
                        <span class="cc-action-card-sub">キーからコードを探して、指板上で構成音やフォームを確認します。</span>
                    </span>
                    <span class="cc-action-card-chevron">›</span>
                </button>
                <button type="button" class="cc-action-card" id="cc-go-library">
                    <span class="cc-action-card-icon">📚</span>
                    <span class="cc-action-card-body">
                        <span class="cc-action-card-label">コード本棚</span>
                        <span class="cc-action-card-sub">保存したコードフォームをフォルダごとに整理します。</span>
                    </span>
                    <span class="cc-action-card-chevron">›</span>
                </button>
            </div>
        </section>
        <!-- コードを調べる（STEP 2以降で実装） -->
        <section id="cc-screen-explore" class="cc-screen cc-screen--hidden">
            <header class="cc-page-header"><h2 class="cc-page-title">🔍 コードを調べる</h2></header>
            <div class="cc-card cc-placeholder-card"><p>この画面は次のSTEPで実装します。</p></div>
        </section>
        <!-- コード本棚（STEP 6で実装） -->
        <section id="cc-screen-library" class="cc-screen cc-screen--hidden">
            <header class="cc-page-header"><h2 class="cc-page-title">📚 コード本棚</h2></header>
            <div class="cc-card cc-placeholder-card"><p>この画面は後のSTEPで実装します。</p></div>
        </section>
    </main>
    <footer class="cc-footer">Sound Cruise Series</footer>
</div>
<div id="cc-settings-overlay" class="cc-settings-overlay cc-settings-overlay--hidden" role="dialog" aria-modal="true" aria-labelledby="cc-settings-title" aria-hidden="true">
    <div class="cc-settings-panel">
        <header class="cc-settings-head">
            <button type="button" id="cc-settings-close" class="cc-settings-back-btn">← 戻る</button>
            <h2 id="cc-settings-title">設定</h2>
            <span class="cc-settings-head-spacer" aria-hidden="true"></span>
        </header>
        <section class="cc-settings-card" aria-labelledby="cc-settings-fretboard-title">
            <h3 id="cc-settings-fretboard-title">指板の表示</h3>
            <div class="cc-settings-item">
                <div class="cc-settings-item-head">
                    <span class="cc-settings-item-label">フレット番号の大きさ</span>
                </div>
                <p class="cc-settings-note">指板下部に表示するフレット番号の文字サイズを選べます。</p>
                <div class="cc-settings-choices" role="group" aria-label="フレット番号の大きさ">
                    <button type="button" class="cc-settings-choice" data-fret-number-size="small" aria-pressed="false">小</button>
                    <button type="button" class="cc-settings-choice" data-fret-number-size="medium" aria-pressed="true">標準</button>
                    <button type="button" class="cc-settings-choice" data-fret-number-size="large" aria-pressed="false">大</button>
                </div>
            </div>
            <div class="cc-settings-item">
                <div class="cc-settings-item-head">
                    <span class="cc-settings-item-label">強調するフレット番号</span>
                </div>
                <p class="cc-settings-note">番号の明るさだけを変更します。指板上のポジションドットは常に実フレット位置で表示されます。</p>
                <div class="cc-settings-choices" role="group" aria-label="強調するフレット番号">
                    <button type="button" class="cc-settings-choice" data-fret-highlight-mode="all" aria-pressed="true">すべて</button>
                    <button type="button" class="cc-settings-choice" data-fret-highlight-mode="position" aria-pressed="false">ポジションマーク</button>
                    <button type="button" class="cc-settings-choice" data-fret-highlight-mode="custom" aria-pressed="false">カスタム</button>
                </div>
                <div id="cc-settings-custom-frets" class="cc-settings-custom-wrap" hidden>
                    <p class="cc-settings-note">強調したい番号を複数選べます（0〜25F）。</p>
                    <div id="cc-settings-custom-grid" class="cc-settings-custom-grid" role="group" aria-label="カスタムで強調するフレット番号"></div>
                </div>
            </div>
        </section>
    </div>
</div>
<script src="js/core/storage.js?v=0.13.0"></script>
<script src="js/core/music-theory.js?v=0.13.0"></script>
<script src="js/core/caged-forms.js?v=0.13.0"></script>
<script src="js/core/chord-model.js?v=0.13.0"></script>
<script src="js/core/chord-info.js?v=0.13.0"></script>
<script src="js/ui/fretboard.js?v=0.13.0"></script>
<script src="js/ui/save-editor.js?v=0.13.0"></script>
<script src="js/ui/chord-builder.js?v=0.13.0"></script>
<script src="js/ui/chord-export.js?v=0.13.0"></script>
<script src="js/ui/library.js?v=0.13.0"></script>
<script src="js/ui/explore.js?v=0.13.0"></script>
<script src="js/ui/settings.js?v=0.13.0"></script>
<script src="js/app.js?v=0.13.0"></script>
</body>
</html>
